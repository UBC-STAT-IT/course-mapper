<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <script src="https://d3js.org/d3.v6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/underscore@1.12.0/underscore-min.js"></script>
  <link rel="stylesheet" type="text/css" href="main.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <title>Stats Course Mapper</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XKD62LW606"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XKD62LW606');
  </script>
</head>

<body>
  
  <div id="dashboard">

    <header id="header">
      <button id="hamburger-btn" class="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h2>
        UBC <span style="margin-left: 15px;"></span>
        <span id="dept-stats" class="dept-toggle active">Statistics</span>
        <span class="dept-separator">|</span>
        <span id="dept-dsci" class="dept-toggle">Data Science</span>
      </h2>
    </header>
      
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="program-track-nav">
    </div>

    <script id="course-info-template" type="text/template">
      <h3><%= number %> <%= title %></h3>
      <p><%= description %></p>
      <% if (prereqs.length > 0) { %>
      <h4>Prerequisites</h4>
      <ul><% _.each(prereqs, function(prereq) { %>
        <li><%= prereq.description %></li>
        <% }); %>
      </ul>
      <% }; %>
      <% if (coreqs.length > 0) { %>
      <h4>Corequisites</h4>
      <ul><% _.each(coreqs, function(coreq) { %>
        <li><%= coreq.description %></li>
        <% }); %>
      </ul>
      <% }; %>
      <% if (notes.length > 0) { %>
      <h4>Notes</h4>
      <p><%= notes %></p>
      <% }; %>
    </script>
    <div id="course-info"></div>

    <div id="course-map">
      <svg></svg>
      <button id="legend-toggle" class="legend-toggle-btn" aria-label="Toggle legend">
        <span>Legend</span>
      </button>
      <div id="legend-panel" class="legend-panel">
        <button id="legend-close" class="legend-close-btn" aria-label="Close legend">×</button>
        <div id="legend-content"></div>
      </div>
    </div>
  
  </div>
  
  <script src="main.js"></script>
  <script>
    // Department toggle functionality
    document.getElementById('dept-stats').addEventListener('click', function() {
      if (currentDepartment === 'stats' || isDepartmentTransitioning) return;
      document.getElementById('dept-stats').classList.add('active');
      document.getElementById('dept-dsci').classList.remove('active');
      loadDepartmentData('stats', false);
    });
    document.getElementById('dept-dsci').addEventListener('click', function() {
      if (currentDepartment === 'dsci' || isDepartmentTransitioning) return;
      document.getElementById('dept-dsci').classList.add('active');
      document.getElementById('dept-stats').classList.remove('active');
      loadDepartmentData('dsci', false);
    });

    // ============================================
    // RESPONSIVE & MOBILE FUNCTIONALITY
    // ============================================
    
    // Hamburger menu toggle
    const hamburger = document.getElementById('hamburger-btn');
    const sidebar = document.getElementById('program-track-nav');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    
    function toggleSidebar() {
      hamburger.classList.toggle('active');
      sidebar.classList.toggle('active');
      sidebarOverlay.classList.toggle('active');
    }
    
    hamburger.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);
    
    // Close sidebar when program is selected on mobile/tablet
    const programNavDiv = document.getElementById('program-track-nav');
    programNavDiv.addEventListener('click', function(e) {
      if (e.target.classList.contains('program') && window.innerWidth < 1024) {
        toggleSidebar();
      }
    });
    
    // Legend toggle
    const legendToggle = document.getElementById('legend-toggle');
    const legendPanel = document.getElementById('legend-panel');
    const legendClose = document.getElementById('legend-close');
    
    function toggleLegend() {
      legendPanel.classList.toggle('active');
    }
    
    legendToggle.addEventListener('click', toggleLegend);
    legendClose.addEventListener('click', toggleLegend);
    
    // Touch event handling is now integrated in main.js
    // No additional setup needed here
    
    // Re-setup may be needed after department transitions
    window.addEventListener('resize', function() {
      // Touch events are reattached when visualization updates
    });
  </script>

  <footer id="disclaimer-footer">
    <p>If there is any discrepancy between the CourseMapper and the <a href="https://vancouver.calendar.ubc.ca/faculties-colleges-and-schools/faculty-science/bachelor-science/statistics" target="_blank" rel="noopener noreferrer">UBC Calendar</a>, please refer to the Calendar, as it contains the most current and official requirements for course requisites and program requirements.</p>
  </footer>

</body>
</html>
